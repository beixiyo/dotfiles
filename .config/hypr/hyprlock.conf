# matugen 生成的 Material You 配色变量
source = ~/.cache/matugen/hyprlock-colors.conf

# 全局字体
$font = sans-serif

general {
  hide_cursor = false        # 锁屏时不隐藏鼠标
  ignore_empty_input = true  # 空密码按回车不显示"验证失败"
}

animations {
  enabled = true
  bezier = linear, 1, 1, 0, 0          # 线性动画曲线
  animation = fadeIn, 1, 3, linear      # 锁屏界面淡入（3 个单位时长）
  animation = fadeOut, 1, 5, linear     # 解锁后淡出（5 个单位时长）
  animation = inputFieldDots, 1, 2, linear  # 密码圆点跳动动画
}

background {
  monitor =                             # 留空 = 应用到所有显示器
  path = ~/.cache/.current_wallpaper    # 当前壁纸（wallpaper-cycle.sh 创建的 symlink）
  color = $surface                      # 壁纸加载失败时的纯色兜底

  blur_size = 3              # 模糊半径（越大越糊，0-10）
  blur_passes = 2            # 模糊迭代次数（越多越均匀平滑，但更耗性能）
  noise = 0.01               # 噪点强度（防止模糊后出现色带/banding）
  contrast = 1.0             # 对比度（1.0 = 原图，>1 增强，让文字更易读）
  brightness = 1.0           # 亮度（1.0 = 原图，<1 压暗背景）
  vibrancy = 0.21            # 色彩鲜艳度（模糊会让颜色变灰，这里补偿回来）
  vibrancy_darkness = 0.0    # 暗部额外鲜艳度（0 = 暗部不补偿，配合低 brightness 使用）
}

# 小时
label {
  monitor =
  text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
  color = $primary            # 主色调
  font_size = 130
  font_family = $font
  shadow_passes = 3           # 文字阴影迭代次数（增加立体感）
  shadow_size = 4             # 阴影扩散大小
  position = 0, 29%           # 水平居中，垂直方向 29%（偏上）
  halign = center
  valign = center
}

# 分钟
label {
  monitor =
  text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
  color = $primary
  font_size = 130
  font_family = $font
  shadow_passes = 3
  shadow_size = 4
  position = 0, 16%           # 在小时下方，间距 13%
  halign = center
  valign = center
}

# 星期
label {
  monitor =
  text = cmd[update:18000000] echo "<b><big> $(LC_TIME=zh_CN.UTF-8 date +'%A') </big></b>"
  color = $secondary          # 次级颜色，建立视觉层级
  font_size = 28
  font_family = $font
  position = 0, 7%
  halign = center
  valign = center
}

# 日期
label {
  monitor =
  text = cmd[update:18000000] echo "<b> $(LC_TIME=zh_CN.UTF-8 date +'%b %d') </b>"
  color = $secondary
  font_size = 18
  font_family = $font
  position = 0, 4%
  halign = center
  valign = center
}

# 密码输入框
input-field {
  monitor =
  size = 9%, 3.1%             # 宽高（百分比适配不同分辨率）
  outline_thickness = 2       # 边框粗细
  dots_size = 0.26            # 密码圆点大小（相对输入框高度）
  dots_spacing = 0.64         # 圆点间距
  dots_center = true          # 圆点垂直居中
  dots_rounding = -1          # -1 = 完美圆形
  rounding = 12               # 输入框圆角半径
  outer_color = $primary $tertiary $primary  # 边框渐变色（主色→第三色→主色）
  inner_color = $surface_container           # 输入框背景色
  font_color = $on_surface                   # 输入文字颜色
  check_color = $secondary                   # 验证中颜色
  fail_color = $error                        # 验证失败颜色
  fade_on_empty = false       # 空密码时输入框也保持显示
  placeholder_text = <i>Password...</i>      # 占位提示文字
  position = 0, 10%           # 底部上方 10%
  halign = center
  valign = bottom
}
