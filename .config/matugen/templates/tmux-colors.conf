set -g status-bg "{{colors.surface.default.hex}}"
set -g status-fg "{{colors.on_surface.default.hex}}"

set -g @accent "{{colors.primary.default.hex}}"

set -g window-status-style          "fg={{colors.outline.default.hex}}"
set -g window-status-current-style  "fg={{colors.primary.default.hex}},bold"

set -g @cpu_low_fg_color    "{{colors.tertiary.default.hex}}"
set -g @cpu_medium_fg_color "{{colors.secondary.default.hex}}"
set -g @cpu_high_fg_color   "{{colors.error.default.hex}}"

set -g @ram_low_fg_color    "{{colors.tertiary.default.hex}}"
set -g @ram_medium_fg_color "{{colors.secondary.default.hex}}"
set -g @ram_high_fg_color   "{{colors.error.default.hex}}"
