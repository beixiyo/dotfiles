set -g status-bg "{{colors.surface.default.hex}}"
set -g status-fg "{{colors.on_surface.default.hex}}"

set -g @accent "{{colors.primary.default.hex}}"

set -g window-status-style          "fg={{colors.outline.default.hex}}"
set -g window-status-current-style  "fg={{colors.primary.default.hex}},bold"

set -g @status_cpu_low    "{{colors.tertiary.default.hex}}"
set -g @status_cpu_medium "{{colors.secondary.default.hex}}"
set -g @status_cpu_high   "{{colors.error.default.hex}}"

set -g @status_ram_low    "{{colors.tertiary.default.hex}}"
set -g @status_ram_medium "{{colors.secondary.default.hex}}"
set -g @status_ram_high   "{{colors.error.default.hex}}"
