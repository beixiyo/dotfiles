#? Config file for btop v.1.4.6

#* 主题文件名，支持 btop++/bpytop/bashtop 格式的 ".theme" 文件
#* 内置 "Default" 和 "TTY"，自定义主题放在 "$HOME/.config/btop/themes"
color_theme = "Default"

#* 是否显示主题设定的背景色，设为 false 可保持终端透明效果
theme_background = true

#* 启用 24 位真彩色，false 则降级为 256 色（6x6x6 色立方）
truecolor = true

#* 强制 TTY 模式（16 色 + TTY 主题 + tty 图形符号），通常无需开启
force_tty = false

#* 布局预设，预设 0 始终为默认全部面板。最多 9 个预设
#* 格式: "box_name:P:G,box_name:P:G" P=0/1 交替位置, G=图形符号
#* 用空格分隔不同预设，按 p 键切换
presets = "cpu:1:default,proc:0:default cpu:0:default,mem:0:default,net:0:default cpu:0:block,net:0:tty"

#* 启用 vim 方向键 h/j/k/l/g/G 导航列表
#* 开启后 h(帮助) 和 k(杀进程) 需按住 Shift 访问
vim_keys = false

#* 面板圆角边框（TTY 模式下忽略）
rounded_corners = true

#* 终端同步输出，减少闪烁
terminal_sync = true

#* 图形符号: "braille"(最高分辨率) / "block"(通用) / "tty"(兼容性最好)
graph_symbol = "braille"

#* 各面板图形符号，"default" 跟随全局设置
graph_symbol_cpu = "default"
graph_symbol_mem = "default"
graph_symbol_net = "default"
graph_symbol_proc = "default"

#* 显示哪些面板，可选: cpu mem net proc gpu0~gpu5，空格分隔
shown_boxes = "cpu mem net proc"

#* 刷新间隔（毫秒），建议 ≥2000 以获得更好的图形采样
update_ms = 2000

#* 进程排序方式
#* 可选: "pid" "program" "arguments" "threads" "user" "memory" "cpu lazy" "cpu direct"
#* "cpu lazy" 平滑追踪（更易跟读）/ "cpu direct" 实时跳动
proc_sorting = "memory"

#* 反转排序方向
proc_reversed = false

#* 树形视图显示进程
proc_tree = false

#* 进程列表使用 CPU 图形配色
proc_colors = true

#* 进程列表使用渐变暗效果
proc_gradient = true

#* 进程 CPU 用量：false=总 CPU 占比，true=所在核心占比
proc_per_core = false

#* 进程内存显示为字节数（false 则显示百分比）
proc_mem_bytes = true

#* 每个进程显示 CPU 迷你图
proc_cpu_graphs = true

#* (Linux) 使用 /proc/[pid]/smaps 获取更精确的内存信息（非常慢）
proc_info_smaps = false

#* 进程面板放在屏幕左侧（默认右侧）
proc_left = false

#* (Linux) 过滤内核进程（类似 htop 行为）
proc_filter_kernel = false

#* 树形视图中，父进程累加子进程资源
proc_aggregate = false

#* 暂停时保留已结束进程的 CPU/内存显示
keep_dead_proc_usage = false

#* CPU 图表上半部分显示的统计项，"total" 始终可用
cpu_graph_upper = "Auto"

#* CPU 图表下半部分显示的统计项
cpu_graph_lower = "Auto"

#* 下半部分 CPU 图表翻转显示
cpu_invert_lower = true

#* 完全禁用下半部分 CPU 图表（只显示单图）
cpu_single_graph = false

#* CPU 面板放在屏幕底部（默认顶部）
cpu_bottom = false

#* 在 CPU 面板显示系统运行时间
show_uptime = true

#* 显示 CPU 功耗（瓦特），需要 setcap/setuid 或 sudo 权限
show_cpu_watts = true

#* 显示 CPU 温度
check_temp = true

#* CPU 温度传感器，"Auto" 自动检测，可在选项菜单中选择
cpu_sensor = "Auto"

#* 显示各核心温度（需 check_temp=true 且检测到传感器）
show_coretemp = true

#* 自定义核心与温度传感器的映射关系
#* 格式 "x:y" x=温度错误的核心, y=温度正确的核心，空格分隔
cpu_core_map = ""

#* 温度单位: "celsius" / "fahrenheit" / "kelvin" / "rankine"
temp_scale = "celsius"

#* 使用十进制单位 KB=1000（false 则用二进制 KiB=1024）
base_10_sizes = false

#* 显示 CPU 频率
show_cpu_freq = true

#* 顶部时钟格式（strftime），留空禁用
#* 特殊变量: /host=主机名 /user=用户名 /uptime=运行时间
clock_format = "%X"

#* 菜单打开时继续后台刷新 UI（闪烁严重可设为 false）
background_update = true

#* 自定义 CPU 型号名称，留空使用系统检测值
custom_cpu_name = ""

#* 磁盘过滤器，填写挂载点完整路径，空格分隔
#* 加 exclude= 前缀表示排除。例: "exclude=/boot /home/user"
disks_filter = ""

#* 内存值显示为图形（false 则显示仪表条）
mem_graphs = true

#* 内存面板放在网络面板下方
mem_below_net = false

#* 将 ZFS ARC 计入缓存和可用内存
zfs_arc_cached = true

#* 显示 swap 内存
show_swap = true

#* 将 swap 显示为磁盘（插入到第一个磁盘之后）
swap_disk = true

#* 内存面板中同时显示磁盘信息
show_disks = true

#* 仅显示物理磁盘（false 则包含网络盘、RAM 盘等）
only_physical = true

#* 从 /etc/fstab 读取磁盘列表（会禁用 only_physical）
use_fstab = true

#* 隐藏 ZFS 数据集，仅显示 ZFS 池（按池计算 IO 统计）
zfs_hide_datasets = false

#* 显示特权用户可用磁盘空间
disk_free_priv = false

#* 在磁盘视图中显示 IO 活动百分比（磁盘繁忙时间）
show_io_stat = true

#* 磁盘 IO 模式（显示大图表展示读写速度）
io_mode = false

#* IO 模式中合并读写图表
io_graph_combined = false

#* IO 图表最大速度(MiB/s)，格式 "挂载点:速度"，空格分隔
io_graph_speeds = ""

#* 网络图表固定值(Mebibits)，仅在 net_auto=false 时生效
net_download = 100
net_upload = 100

#* 网络图表自动缩放（忽略上面的固定值，最低缩放到 10 KiB）
net_auto = true

#* 上传和下载图表使用相同缩放比例（取较高者）
net_sync = true

#* 指定默认网络接口，留空自动选择
net_iface = ""

#* 比特率单位: true=十进制(Kbps/Mbps) / false=二进制(Kibps/Mibps) / "Auto"=跟随 base_10_sizes
base_10_bitrate = "Auto"

#* 显示电池状态（右上角）
show_battery = true

#* 使用哪个电池（多电池时），"Auto" 自动检测
selected_battery = "Auto"

#* 在电池指示器旁显示功率信息
show_battery_watts = true

#* 日志级别: "ERROR" "WARNING" "INFO" "DEBUG"（包含所有更低级别）
#* 日志文件: ~/.local/state/btop.log
log_level = "ERROR"

#* 退出时自动保存当前设置到配置文件
save_config_on_exit = false
