# ╭─────────────────────────────────────────────────────╮
# │                   Copy Mode (vi)                    │
# ╰─────────────────────────────────────────────────────╯

# 开启 vi 风格的快捷键（h/j/k/l 移动等）
set-window-option -g mode-keys vi

# 进入复制模式：Prefix + v
bind v copy-mode

# --- 复制模式内的键位绑定 (copy-mode-vi) ---

# 开始选择：v (对应 Vim 的 v)
bind-key -T copy-mode-vi v   send-keys -X begin-selection

# 矩形选择切换：Ctrl+v (对应 Vim 的 Ctrl-v)
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# 复制选区（保持 copy mode，和 vim yank 行为一致）
bind-key -T copy-mode-vi y send-keys -X copy-selection

# 鼠标选中松开后只复制，不退出 copy mode（避免视图跳回底部）
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection

# 复制选区并退出 copy mode
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# 复制整行：Y（等价于 vim 的 yy / Y）
bind-key -T copy-mode-vi Y send-keys -X copy-line

# 跳转到上/下一条命令提示符（starship prompt U+F432，hex ef 90 b2）
run-shell "tmux set -g @prompt_char $(printf '\\xef\\x90\\xb2')"
bind-key -T copy-mode-vi [ run-shell 'tmux send-keys -X search-backward "$(tmux show -gvq @prompt_char)"'
bind-key -T copy-mode-vi ] run-shell 'tmux send-keys -X search-forward "$(tmux show -gvq @prompt_char)"'

# 鼠标滚轮速度（-N 控制每次滚动行数，默认 5，改小避免飞滚）
bind-key -T copy-mode-vi WheelUpPane   send-keys -X -N 2 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 2 scroll-down

# 复制模式内的滚动速度 (C-e / C-y)
bind-key -T copy-mode-vi C-e send-keys -X -N 5 scroll-down
bind-key -T copy-mode-vi C-y send-keys -X -N 5 scroll-up

# 普通模式下滚轮行为：
# 1. 如果在 copy-mode 或程序开启了鼠标支持（如 nvim set mouse=a），透传鼠标事件
# 2. 如果在 alternate screen（如 nvim/less 未开启鼠标），发送 Up/Down 模拟滚动
# 3. 否则进入 copy-mode
bind -T root WheelUpPane \
  if-shell -Ft= "#{?pane_in_mode,1,#{mouse_any_flag}}" \
    "send-keys -Mt=" \
    "if-shell -Ft= '#{alternate_on}' \
      'send-keys -t= -N 2 Up' \
      'copy-mode -e; send-keys -t= -X -N 2 scroll-up'"

bind -T root WheelDownPane \
  if-shell -Ft= "#{?pane_in_mode,1,#{mouse_any_flag}}" \
    "send-keys -Mt=" \
    "if-shell -Ft= '#{alternate_on}' \
      'send-keys -t= -N 2 Down' \
      'send-keys -Mt='"
