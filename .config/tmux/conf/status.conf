# ╭─────────────────────────────────────────────────────╮
# │                    Status Bar                       │
# ╰─────────────────────────────────────────────────────╯

# 状态栏显示在顶部
set -g status-position top

# 基础状态栏颜色 (基于 Catppuccin Mocha 主题)
# 默认颜色：matugen 未生成时的 fallback，文件末尾 source matugen 时被覆盖
set -g status-bg '#1e1e2e'
set -g status-fg '#cdd6f4'
set -g @accent '#cba6f7'


# 左侧状态栏 (Status Left) - 显示 tmux 图标、Session 名字和智能截断的路径
set -g status-left '#[fg=#{@accent}]  #S#[fg=black] ⟩ #(echo "#{pane_current_path}" \
  | sed "s|^$HOME|~|" \
  | awk -F/ '\''{
      n = NF
      if (n > 3)
        path = $(n-2)"/"$(n-1)"/"$n
      else
        path = $0

      max = 20

      if (length(path) > max)
        print ".." substr(path, length(path)-max+4)
      else
        print path
  }'\'') '

set -g status-left-length 0

# 窗口状态 (Tabs) 的默认与选中样式
set -g window-status-style 'fg=#585b70'
set -g window-status-current-style 'fg=#cba6f7,bold'

# 窗口文字格式：带圆圈的漂亮数字索引 + Zoom 状态
# 根据平台自动选择：WSL/Windows 用标准数字 (清晰)，macOS 用 Square 图标 (漂亮)
if-shell 'uname -a | grep -qi microsoft' \
    "set -g window-status-format ' #I #W#{?window_zoomed_flag, 󰁌 , }' ; \
     set -g window-status-current-format ' #I #W#{?window_zoomed_flag, 󰁌 , }'" \
    "set -g window-status-format '#{?#{==:#{window_index},1},󰬺 ,#{?#{==:#{window_index},2},󰬻 ,#{?#{==:#{window_index},3},󰬼 ,#{?#{==:#{window_index},4},󰬽 ,#{?#{==:#{window_index},5},󰬾 ,#{?#{==:#{window_index},6},󰬿 ,#{?#{==:#{window_index},7},󰭀 ,#{?#{==:#{window_index},8},󰭁 ,#{?#{==:#{window_index},9},󰭂 ,󰿩 }}}}}}}}}#W#{?window_zoomed_flag, 󰁌 , }' ; \
     set -g window-status-current-format '#{?#{==:#{window_index},1},󰬺 ,#{?#{==:#{window_index},2},󰬻 ,#{?#{==:#{window_index},3},󰬼 ,#{?#{==:#{window_index},4},󰬽 ,#{?#{==:#{window_index},5},󰬾 ,#{?#{==:#{window_index},6},󰬿 ,#{?#{==:#{window_index},7},󰭀 ,#{?#{==:#{window_index},8},󰭁 ,#{?#{==:#{window_index},9},󰭂 ,󰿩 }}}}}}}}}#W#{?window_zoomed_flag, 󰁌 , }'"

# 采集器用到的全部配色与阈值集中在此声明，脚本只读不写。
# 硬编码的是 Catppuccin Mocha 值，作用同上：matugen 未生成时的 fallback
set -g @status_cpu_low '#a6e3a1'
set -g @status_cpu_medium '#f9e2af'
set -g @status_cpu_high '#f38ba8'
set -g @status_ram_low '#a6e3a1'
set -g @status_ram_medium '#f9e2af'
set -g @status_ram_high '#f38ba8'

# 网速配色（原先散落在 net_speed.sh 里直接读 catppuccin 的 @thm_*，
# 与本文件的取色方式不一致，现统一收敛到这里）
set -g @status_net_base '#1e1e2e'
set -g @status_net_text '#cdd6f4'
set -g @status_net_surface '#313244'
set -g @status_net_down '#a6e3a1'
set -g @status_net_up '#fab387'
set -g @status_net_threshold '30720'   # 30 KB/s，低于此值不显示

# matugen 动态主题色：放在所有硬编码默认值之后 source —— 存在时覆盖上方 fallback
# (status-bg/fg、window-status、cpu/ram 颜色)；缺失时 -q 静默忽略，沿用 Catppuccin 默认
source-file -q ~/.config/tmux/conf/matugen-colors.conf

# 右侧状态栏：采集器推送用户选项，渲染状态栏本身不启动子进程
set -g status-right-length 80
set -g status-right "#[fg=#{@status_cpu_color}] 󰻠 #{@status_cpu} #[fg=#{@status_ram_color}] 󰍛 #{@status_ram} #[default]"
set -gF @status_cpu "#{?@status_cpu,#{@status_cpu},--}"
set -gF @status_ram "#{?@status_ram,#{@status_ram},--}"
set -gF @status_cpu_color "#{?@status_cpu_color,#{@status_cpu_color},#{@status_cpu_low}}"
set -gF @status_ram_color "#{?@status_ram_color,#{@status_ram_color},#{@status_ram_low}}"

set -ag status-right "#{@status_net}"

# 启动跨 macOS / Linux 的状态采集器
run-shell -b "~/.config/tmux/scripts/status-feed.sh 5"
