# ╭─────────────────────────────────────────────────────╮
# │                    Status Bar                       │
# ╰─────────────────────────────────────────────────────╯

# 状态栏显示在顶部
set -g status-position top

# 基础状态栏颜色 (基于 Catppuccin Mocha 主题)
# 默认颜色：matugen 未生成时的 fallback，文件末尾 source matugen 时被覆盖
set -g status-bg '#1e1e2e'
set -g status-fg '#cdd6f4'
set -g @accent '#cba6f7'


# 左侧状态栏 (Status Left) - 显示 tmux 图标、Session 名字和智能截断的路径
set -g status-left '#[fg=#{@accent}]  #S#[fg=black] ⟩ #(echo "#{pane_current_path}" \
  | sed "s|^$HOME|~|" \
  | awk -F/ '\''{
      n = NF
      if (n > 3)
        path = $(n-2)"/"$(n-1)"/"$n
      else
        path = $0

      max = 20

      if (length(path) > max)
        print ".." substr(path, length(path)-max+4)
      else
        print path
  }'\'') '

set -g status-left-length 0

# 窗口状态 (Tabs) 的默认与选中样式
set -g window-status-style 'fg=#585b70'
set -g window-status-current-style 'fg=#cba6f7,bold'

# 窗口文字格式：带圆圈的漂亮数字索引 + Zoom 状态
# 根据平台自动选择：WSL/Windows 用标准数字 (清晰)，macOS 用 Square 图标 (漂亮)
if-shell 'uname -a | grep -qi microsoft' \
    "set -g window-status-format ' #I #W#{?window_zoomed_flag, 󰁌 , }' ; \
     set -g window-status-current-format ' #I #W#{?window_zoomed_flag, 󰁌 , }'" \
    "set -g window-status-format '#{?#{==:#{window_index},1},󰬺 ,#{?#{==:#{window_index},2},󰬻 ,#{?#{==:#{window_index},3},󰬼 ,#{?#{==:#{window_index},4},󰬽 ,#{?#{==:#{window_index},5},󰬾 ,#{?#{==:#{window_index},6},󰬿 ,#{?#{==:#{window_index},7},󰭀 ,#{?#{==:#{window_index},8},󰭁 ,#{?#{==:#{window_index},9},󰭂 ,󰿩 }}}}}}}}}#W#{?window_zoomed_flag, 󰁌 , }' ; \
     set -g window-status-current-format '#{?#{==:#{window_index},1},󰬺 ,#{?#{==:#{window_index},2},󰬻 ,#{?#{==:#{window_index},3},󰬼 ,#{?#{==:#{window_index},4},󰬽 ,#{?#{==:#{window_index},5},󰬾 ,#{?#{==:#{window_index},6},󰬿 ,#{?#{==:#{window_index},7},󰭀 ,#{?#{==:#{window_index},8},󰭁 ,#{?#{==:#{window_index},9},󰭂 ,󰿩 }}}}}}}}}#W#{?window_zoomed_flag, 󰁌 , }'"

# 设置 tmux-cpu 的文字颜色，根据负载动态显示 (基于 Catppuccin Mocha)
set -g @cpu_low_fg_color "#a6e3a1"    # Green
set -g @cpu_medium_fg_color "#f9e2af" # Yellow
set -g @cpu_high_fg_color "#f38ba8"   # Red

set -g @ram_low_fg_color "#a6e3a1"
set -g @ram_medium_fg_color "#f9e2af"
set -g @ram_high_fg_color "#f38ba8"

# matugen 动态主题色：放在所有硬编码默认值之后 source —— 存在时覆盖上方 fallback
# (status-bg/fg、window-status、cpu/ram 颜色)；缺失时 -q 静默忽略，沿用 Catppuccin 默认
source-file -q ~/.config/tmux/conf/matugen-colors.conf

# 右侧状态栏：CPU / RAM (参考 https://github.com/patricorgi/dotfiles) + 自定义网速
set -g status-right-length 80
set -g status-right "#[fg=#{cpu_fg_color}] 󰻠 #{cpu_percentage} #[fg=#{ram_fg_color}] 󰍛 #{ram_percentage} #[default]"

# 本地测试网速显示命令
# printf '%s %s %s\n' "$(( $(date +%s) - 1 ))" "0" "0" > /tmp/.tmux_netspeed
set -ag status-right " #(~/.config/tmux/scripts/net_speed.sh)"

# 激活 tmux-cpu 插件（必须在 status-right 用到变量之后 run）
run ~/.config/tmux/plugins/tmux-cpu/cpu.tmux

