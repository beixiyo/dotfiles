# ╭─────────────────────────────────────────────────────╮
# │    Pane 管理（与终端 ctrl+alt+* 对齐，不带 prefix） │
# ╰─────────────────────────────────────────────────────╯

# 右键粘贴：程序捕获了鼠标（nvim 等）→ 透传；否则 → 粘贴系统剪贴板
bind-key -T root MouseDown3Pane \
  if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
    "send-keys -M" \
    'run-shell "~/.config/tmux/scripts/clipboard_paste.sh | tmux load-buffer - && tmux paste-buffer -p"'

# 分裂 / 关闭
bind-key -n C-M-\\ split-window -h -c "#{pane_current_path}"
bind-key -n C-M--  split-window -v -c "#{pane_current_path}"
bind-key -n C-M-w  kill-pane

# ── 焦点切换 / 大小调整 ──
#
# 「这个键该给 nvim 还是给 tmux」的判定逻辑全在 scripts/pane-nav.sh 里，
# 那边有完整注释和取舍说明。要点：只认「谁在前台占着终端」，不读
# smart-splits 写的 @pane-is-vim —— 那个状态会在 nvim 被 kill / 崩溃后残留，
# 让 pane 永久切不出去，这正是这套配置以前的老毛病
#
# 覆盖：直接的 nvim、env/sudo 等包装、不 exec 的包装脚本、git commit 与
# yazi 里拉起的编辑器、ssh/mosh 远端会话；排除：挂起或后台的 nvim、
# AI CLI 拉起的 --headless nvim
%hidden PANE_NAV="~/.config/tmux/scripts/pane-nav.sh"

bind-key -n C-M-h run-shell -b "$PANE_NAV move h '#{pane_id}'"
bind-key -n C-M-j run-shell -b "$PANE_NAV move j '#{pane_id}'"
bind-key -n C-M-k run-shell -b "$PANE_NAV move k '#{pane_id}'"
bind-key -n C-M-l run-shell -b "$PANE_NAV move l '#{pane_id}'"

bind-key -n C-M-Left  run-shell -b "$PANE_NAV resize h '#{pane_id}'"
bind-key -n C-M-Down  run-shell -b "$PANE_NAV resize j '#{pane_id}'"
bind-key -n C-M-Up    run-shell -b "$PANE_NAV resize k '#{pane_id}'"
bind-key -n C-M-Right run-shell -b "$PANE_NAV resize l '#{pane_id}'"

# 当前 pane 全屏/恢复；tmux 原生 per-window zoom，不创建隐藏 window
bind-key -n C-M-b resize-pane -Z

# copy-mode-vi 下用同一组键切 pane（防止进入 copy mode 后卡住）
bind-key -T copy-mode-vi C-M-h if -F "#{pane_at_left}"   "" "select-pane -L"
bind-key -T copy-mode-vi C-M-j if -F "#{pane_at_bottom}" "" "select-pane -D"
bind-key -T copy-mode-vi C-M-k if -F "#{pane_at_top}"    "" "select-pane -U"
bind-key -T copy-mode-vi C-M-l if -F "#{pane_at_right}"  "" "select-pane -R"

# Ctrl+Click 打开 URL：OSC 8 超链接优先取真实目标，普通文本回退到点击位置的词
# #{q:...} 直接生成安全的 shell 参数，避免经过嵌套 run-shell 时中间变量被提前展开
bind -n C-MouseDown1Pane \
  if-shell -F "#{||:#{m:*://*,#{mouse_hyperlink}},#{m:*://*,#{mouse_word}}}" \
    'run-shell -b "~/.config/tmux/scripts/open-url.sh #{?#{m:*://*,#{mouse_hyperlink}},#{q:mouse_hyperlink},#{q:mouse_word}}"'
