# ╭─────────────────────────────────────────────────────╮
# │    Pane 管理（与终端 ctrl+alt+* 对齐，不带 prefix）     │
# ╰─────────────────────────────────────────────────────╯

# 右键粘贴：程序捕获了鼠标（nvim 等）→ 透传；否则 → 粘贴系统剪贴板
bind-key -T root MouseDown3Pane \
  if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
    "send-keys -M" \
    'run-shell "~/.config/tmux/scripts/clipboard_paste.sh | tmux load-buffer - && tmux paste-buffer -p"'

# 分裂 / 关闭
bind-key -n C-M-\\ split-window -h -c "#{pane_current_path}"
bind-key -n C-M--  split-window -v -c "#{pane_current_path}"
bind-key -n C-M-w  kill-pane

# 焦点切换（Nvim 前台 → 透传给 smart-splits；否则 select-pane）
# 原理：smart-splits 启动时执行 tmux set-option -p @pane-is-vim 1，ExitPre 时清除
bind-key -n C-M-h if -F "#{@pane-is-vim}" 'send-keys C-M-h' 'if -F "#{pane_at_left}"   "" "select-pane -L"'
bind-key -n C-M-j if -F "#{@pane-is-vim}" 'send-keys C-M-j' 'if -F "#{pane_at_bottom}" "" "select-pane -D"'
bind-key -n C-M-k if -F "#{@pane-is-vim}" 'send-keys C-M-k' 'if -F "#{pane_at_top}"    "" "select-pane -U"'
bind-key -n C-M-l if -F "#{@pane-is-vim}" 'send-keys C-M-l' 'if -F "#{pane_at_right}"  "" "select-pane -R"'

# 大小调整（方向键）
bind-key -n C-M-Left  if -F "#{@pane-is-vim}" 'send-keys C-M-Left'  'resize-pane -L 3'
bind-key -n C-M-Down  if -F "#{@pane-is-vim}" 'send-keys C-M-Down'  'resize-pane -D 3'
bind-key -n C-M-Up    if -F "#{@pane-is-vim}" 'send-keys C-M-Up'    'resize-pane -U 3'
bind-key -n C-M-Right if -F "#{@pane-is-vim}" 'send-keys C-M-Right' 'resize-pane -R 3'

# 当前 pane 全屏/恢复；tmux 原生 per-window zoom，不创建隐藏 window
bind-key -n C-M-b resize-pane -Z

# copy-mode-vi 下用同一组键切 pane（防止进入 copy mode 后卡住）
bind-key -T copy-mode-vi C-M-h if -F "#{pane_at_left}"   "" "select-pane -L"
bind-key -T copy-mode-vi C-M-j if -F "#{pane_at_bottom}" "" "select-pane -D"
bind-key -T copy-mode-vi C-M-k if -F "#{pane_at_top}"    "" "select-pane -U"
bind-key -T copy-mode-vi C-M-l if -F "#{pane_at_right}"  "" "select-pane -R"

# Ctrl+Click 打开 URL：mouse on 时 tmux 吃掉点击事件，这里手动接管
# #{mouse_word} 取点击位置的词，匹配 *://* 视为 URL 后用脚本跨平台打开
bind -n C-MouseDown1Pane if-shell -F "#{m:*://*,#{mouse_word}}" \
  'run-shell -b "~/.config/tmux/scripts/open-url.sh \"#{mouse_word}\""'
