# ╭─────────────────────────────────────────────────────╮
# │                      Plugins                        │
# ╰─────────────────────────────────────────────────────╯
#
# 新机器首次安装步骤：
#   1. 克隆 tpm（插件管理器）：
#      git clone --depth 1 --single-branch --no-tags https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
#   2. 启动 tmux，加载配置：
#      tmux source ~/.config/tmux/tmux.conf
#   3. 安装所有插件（二选一）：
#      - 在 tmux 内按 prefix + I（大写 i）
#      - 或直接运行：~/.config/tmux/plugins/tpm/bin/install_plugins
#
# 插件装在 ~/.config/tmux/plugins/（由 TMUX_PLUGIN_MANAGER_PATH 决定）
# 更新插件：prefix + U　　卸载不在列表里的插件：prefix + Alt+u

set -g @plugin 'tmux-plugins/tpm'           # 官方插件管理器 (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tmux-sensible' # 广受好评的通用基础配置集合
set -g @plugin 'tmux-plugins/tmux-cpu'      # 提供 CPU 和内存使用状态（用于配置状态栏显示）
set -g @plugin 'catppuccin/tmux'            # 现代化、高颜值的 Catppuccin 主题
set -g @plugin 'tmux-plugins/tmux-resurrect'  # 保存/恢复整个 tmux 环境（窗口、布局、目录、运行的程序）
set -g @plugin 'tmux-plugins/tmux-continuum'  # 在 resurrect 之上：定时自动保存 + 启动自动恢复
# set -g @plugin 'jimeh/tmuxifier'            # 用于快速创建、管理和加载预设的 Tmux 会话/窗口布局

# catppuccin
set -g @catppuccin_flavor 'mocha'

# resurrect: 手动保存 prefix + Ctrl-s，恢复 prefix + Ctrl-r
set -g @resurrect-capture-pane-contents 'on'  # 一并恢复面板内的输出内容
set -g @resurrect-strategy-nvim 'session'     # 配合 nvim session 一起恢复

# 还原 AI CLI 时改写启动命令，自动接回该目录最近一次会话
#   ~xxx 匹配以 xxx 开头的进程，-> 后是恢复时实际执行的命令
set -g @resurrect-processes '"~claude->claude --continue" "~codex->codex resume --last" "~opencode->opencode --continue"'

# continuum: 自动化（@continuum-restore 必须在 run tpm 之前生效）
set -g @continuum-restore 'on'                # tmux 启动时自动恢复上次环境
set -g @continuum-save-interval '15'          # 每 15 分钟自动保存一次

# tpm 必须放最后
run '~/.config/tmux/plugins/tpm/tpm'
