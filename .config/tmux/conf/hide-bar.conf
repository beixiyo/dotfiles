# ╭─────────────────────────────────────────────────────╮
# │       Auto-hide Status Bar (Plan C · tmux side)     │
# ╰─────────────────────────────────────────────────────╯
# 当当前 pane 运行 @hide-bar-cmds 正则命中的命令时，自动隐藏 tmux 状态栏
#
# tmux hook 只能覆盖「切 pane / 切 window / 切 session」的时机；
# 「在同一个 pane 内启动 / 退出 nvim」不会触发任何 tmux hook，
# 所以另需 nvim 的 VimEnter/VimLeave autocmd 主动通知（见 nvim 侧配置）
#
# 要扩展到 man / less / btop 等，直接改下面的正则即可

set -g @hide-bar-cmds '^(nvim|vim)$'

# 切 pane
set-hook -g after-select-pane      "if -F '#{m/r:#{@hide-bar-cmds},#{pane_current_command}}' 'set status off' 'set status on'"
# 切 window
set-hook -g after-select-window    "if -F '#{m/r:#{@hide-bar-cmds},#{pane_current_command}}' 'set status off' 'set status on'"
# 切 client 所挂的 session
set-hook -g client-session-changed "if -F '#{m/r:#{@hide-bar-cmds},#{pane_current_command}}' 'set status off' 'set status on'"
