# ╭─────────────────────────────────────────────────────╮
# │  Window 管理（与终端 ctrl+shift+t / ctrl+1..8 对齐） │
# ╰─────────────────────────────────────────────────────╯

# Window 名 = 当前目录的最后一段（而非默认的进程名）
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Ctrl+Shift+T → 新建 window（对齐终端 new_tab）
# Ctrl+Shift+W → 关闭 window（对齐终端 close_tab）
bind-key -n C-S-t new-window -c "#{pane_current_path}"
bind-key -n C-S-w kill-window

# prefix R → 重命名当前 window
bind R command-prompt -I "#{window_name}" "rename-window '%%'"

# Ctrl+1..8 → 切换到第 N 个 window（对齐终端 goto_tab）
bind-key -n C-1 select-window -t :1
bind-key -n C-2 select-window -t :2
bind-key -n C-3 select-window -t :3
bind-key -n C-4 select-window -t :4
bind-key -n C-5 select-window -t :5
bind-key -n C-6 select-window -t :6
bind-key -n C-7 select-window -t :7
bind-key -n C-8 select-window -t :8
