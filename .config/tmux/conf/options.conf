# ╭─────────────────────────────────────────────────────╮
# │                    Core Options                     │
# ╰─────────────────────────────────────────────────────╯

set -g default-terminal "tmux-256color"

# 扩展键支持（识别 Ctrl+Shift+T、Ctrl+1 等 CSI u 序列）
set -s extended-keys always

# terminal-features 的 `-a` 是追加语义，每次 source 都会再压一份进去（实测每
# 重载一次 +3 条，曾累积到 84 条）。这里用哨兵保证只追加一次。
#
# 不能用 `set -s terminal-features ''` 重置后再追加 —— 那会连 tmux 内置的
# xterm*:clipboard:ccolour:cstyle:focus:title / screen*:title / rxvt*:ignorefkeys
# 一起清掉，剪贴板会失效
%if "#{==:#{@terminal_features_applied},}"
  set -as terminal-features '*:RGB'      # True Color
  set -as terminal-features '*:extkeys'  # CSI u 扩展键
  set -g @terminal_features_applied 1
%endif

# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# 编号从 1 开始，对齐终端 tab 的 Ctrl+1..8
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# 关掉 session 里最后一个 window 时跳到别的 session，而不是整个 tmux 退出
# （popup 的 scratch session 也算 session，没这条容易误退）
set -g detach-on-destroy off

# 默认才 2000 行，AI CLI 的长输出翻几屏就没了
set -g history-limit 1000000

# 鼠标支持
set -g mouse on

# select-word / mouse_word 仅以空格分隔，避免 URL 中 - / . 被切断
set -g word-separators ' '

# 响应速度
set -sg escape-time 0
set -sg repeat-time 0

# 允许 Neovim 等应用通过 OSC 52 写入当前客户端剪贴板
# 这是 server 级选项，不能按本地 / SSH 客户端分别设置
set -s set-clipboard on
set -g allow-passthrough on
