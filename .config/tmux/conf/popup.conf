# ╭─────────────────────────────────────────────────────╮
# │                  Popup 浮层终端                     │
# ╰─────────────────────────────────────────────────────╯
#
# C-`：在当前 pane 目录开一个常驻 scratch 终端（浮层），再按一次收起
#
# 键能到 tmux 手上，靠的是终端侧已有的 CSI u 编码：
#   ghostty  keybind = ctrl+grave_accent=text:\x1b[96;5u
#   kitty    map ctrl+grave send_text all \x1b[96;5u
#   wezterm  SendString('\x1b[96;5u')
# 配合 options.conf 里的 extended-keys always + terminal-features extkeys，
# tmux 才能把这串解析成 C-` 而不是当成普通反引号
#
# 开和关必须分两边实现：popup 打开时键盘归 popup 客户端，nvim 收不到
# <leader>tt，所以「收起」只能是 tmux 层的绑定。判据是当前 session 名，
# popup-* 一律是 popup-term.sh 建出来的 scratch session
#
# detach-client 而不是 kill-session：里面跑着的进程要留着，这正是这套东西
# 相对「弹个新 shell」的全部意义
#
# 万一 tmux 没把 \033[96;5u 解析成 C-`（终端没协商上 extkeys 之类），
# 改用 user-keys 直接按原始字节匹配，绕开按键名解析：
#   set -s user-keys[0] '\033[96;5u'
#   bind-key -n User0 if-shell -F ... （下面这条把 'C-`' 换成 User0）

bind-key -n 'C-`' if-shell -F '#{m:popup-*,#{session_name}}' \
  'detach-client' \
  'run-shell -b "~/.config/tmux/scripts/popup-term.sh #{q:pane_current_path}"'
