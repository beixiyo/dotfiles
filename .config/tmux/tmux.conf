# ╭─────────────────────────────────────────────────────╮
# │    tmux 配置 · 与终端 standalone 模式快捷键对齐      │
# ╰─────────────────────────────────────────────────────╯
# 改动此文件后需手动重载（重启终端不会自动生效）：
#   tmux source ~/.config/tmux/tmux.conf
# 或在 tmux 内按 prefix + r

source-file ~/.config/tmux/conf/options.conf
source-file ~/.config/tmux/conf/copy-mode.conf
source-file ~/.config/tmux/conf/pane.conf
source-file ~/.config/tmux/conf/window.conf
source-file ~/.config/tmux/conf/popup.conf
source-file ~/.config/tmux/conf/plugins.conf
source-file ~/.config/tmux/conf/status.conf
# source-file ~/.config/tmux/conf/hide-bar.conf

# 重载配置（source 入口文件，入口再 source 所有模块）
bind r source-file ~/.config/tmux/tmux.conf \; display " tmux.conf reloaded"
