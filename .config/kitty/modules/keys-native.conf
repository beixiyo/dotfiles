# ╭──────────────────────────────────────────────────────────╮
# │   native 模式（Kitty 原生 tab + pane，集成 smart-splits）    │
# ╰──────────────────────────────────────────────────────────╯
# 本文件在 kitty.conf 中通过 `include` 启用；切 tmux 模式请改
# include modules/keys-tmux.conf
#
# 机制：smart-splits.nvim 启动时设置 Kitty user-var IS_NVIM=true
#       条件映射 `--when-focus-on var:IS_NVIM` 在 Nvim 内 unbind，让键透传


# --- 启用远程控制（smart-splits 的 Kitty backend 依赖 kitty CLI 通过 socket 通信）---
# {kitty_pid} 占位防止多实例冲突；子进程通过 $KITTY_LISTEN_ON 拿到实际路径
allow_remote_control yes
listen_on unix:/tmp/mykitty-{kitty_pid}


# --- Tab 管理（kitty 原生 tab，tmux 模式下改用 tmux window）---
map ctrl+shift+t launch --type=tab --cwd=~/Documents/code/frontend
map ctrl+shift+w close_tab
map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8


# --- 窗格（Pane/Window）创建与关闭 ---
map ctrl+alt+minus     launch --location=hsplit --cwd=current
map ctrl+alt+backslash launch --location=vsplit --cwd=current
map ctrl+alt+w         close_window
map ctrl+alt+b         toggle_layout stack


# --- 窗格切换（Nvim 内透传给 smart-splits）---
map ctrl+alt+h neighboring_window left
map ctrl+alt+j neighboring_window down
map ctrl+alt+k neighboring_window up
map ctrl+alt+l neighboring_window right
map --when-focus-on var:IS_NVIM ctrl+alt+h
map --when-focus-on var:IS_NVIM ctrl+alt+j
map --when-focus-on var:IS_NVIM ctrl+alt+k
map --when-focus-on var:IS_NVIM ctrl+alt+l


# --- 窗格大小调整（方向键）---
# 用 smart-splits 自带的 relative_resize.py kitten（~/.config/kitty/ 下，由 install-kittens.bash 安装）
# 采用「分割线方向」语义：箭头方向 = 分割线移动方向（与 WezTerm AdjustPaneSize 一致）
# Kitty 原生 resize_window narrower/wider 是「大小」语义，在右 pane 按 Left 会从左侧压缩、反直觉
map ctrl+alt+left  kitten relative_resize.py left  3
map ctrl+alt+right kitten relative_resize.py right 3
map ctrl+alt+up    kitten relative_resize.py up    3
map ctrl+alt+down  kitten relative_resize.py down  3
map --when-focus-on var:IS_NVIM ctrl+alt+left
map --when-focus-on var:IS_NVIM ctrl+alt+right
map --when-focus-on var:IS_NVIM ctrl+alt+up
map --when-focus-on var:IS_NVIM ctrl+alt+down
