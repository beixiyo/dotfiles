# ╭─────────────────────────────────────────────────────╮
# │        覆盖主题的颜色（须在主题 include 之后加载）    │
# ╰─────────────────────────────────────────────────────╯
# kitty 后加载覆盖同名项，故这些覆盖必须在 kitty.conf 的
# fallback / matugen 主题 include 之后再 include，否则被主题反向覆盖

# 覆盖主题的选中颜色
selection_background #63667B
selection_foreground #1e1e2e

# 覆盖主题的边框颜色（默认亮紫蓝太显眼）
draw_minimal_borders yes
window_border_width 1px
active_border_color #6B7088
inactive_border_color #6b7088
