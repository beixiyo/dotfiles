# ╭─────────────────────────────────────────────────────╮
# │               主题 / 光标 / 字体 / 透明度           │
# ╰─────────────────────────────────────────────────────╯

# 光标
cursor_shape block
cursor_blink_interval 0
cursor_trail 1
cursor_trail_decay 0.05 0.2
cursor_trail_start_threshold 2

# 窗口装饰
# macOS 专用；其他平台可用 hide_window_decorations yes
hide_window_decorations titlebar-only

# 背景透明度与模糊
background_opacity 0.9
background_blur 7

# 字体
font_family      Maple Mono NF
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# Nerd Font 图标交给 “Symbols Nerd Font Mono”（必须带 Mono！）渲染
# 关键：MDI 等图标在 mono 变体里满格 1.0em，在比例变体 / patched Maple 里只有
# 0.418em（明显偏小）——差一倍多。少了 “Mono” 二字图标就缩水，这正是 f76e870 的坑
# ⚠ 该字体需各平台各自安装，否则图标变方块（兜底字体无此字形）：
#     macOS: brew install --cask font-symbols-only-nerd-font   （含 Mono 变体）
#     Arch : pacman -S ttf-nerd-fonts-symbols-mono
# 区段依据 Nerd Fonts v3 官方 Glyph-Sets 表，仅覆盖 PUA + 少量符号；
# 故意不含框线 U+2500-U+259F（kitty 内置绘制更锐利，不交给字体）
symbol_map U+23fb-U+23fe,U+2665,U+26a1,U+2b58,U+e000-U+e00a,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ea60-U+ec1e,U+ed00-U+efce,U+f000-U+f2ff,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

# 非活动窗格不变暗
inactive_text_alpha 1.0

# Tab bar 样式
tab_bar_edge top
tab_bar_style separator
tab_separator " "
active_tab_title_template " {title} "
tab_title_template        " {title} "
active_tab_font_style     normal

# 覆盖主题的选中颜色
selection_background #63667B
selection_foreground #1e1e2e

# 覆盖主题的边框颜色（默认亮紫蓝太显眼）
draw_minimal_borders yes
window_border_width 1px
active_border_color #6B7088
inactive_border_color #6b7088
