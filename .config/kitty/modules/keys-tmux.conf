# ╭─────────────────────────────────────────────────────╮
# │          tmux 模式（键原样透传给 tmux）              │
# ╰─────────────────────────────────────────────────────╯
# 本文件在 kitty.conf 中通过 `include` 启用；切回 Kitty 原生管理请改
# include modules/keys-native.conf
#
# 本模式下 kitty 不再拦截 tab / 分屏键，全部透传给 tmux。
# tmux 负责：ctrl+alt+hjkl 切 pane（见 ~/.config/tmux/tmux.conf 条件 bind）、
#            ctrl+shift+t / ctrl+1..8 / ctrl+shift+w 切 window
#
# 约定：tmux 模式下不使用 Kitty 原生 tab/pane（用 tmux 的 window/pane 代替），
#       启动时一般直接跑 `tmux new-session -A` 进入主 session


# --- 分屏键：macOS 上 Ctrl+Opt+非字母键 legacy encoding 丢失 Ctrl ---
# Ctrl+Opt+- / Ctrl+Opt+\ 在 macOS legacy 下退化为 \x1b- / \x1b\（M-- / M-\），Ctrl 丢失
# 字母键（hjkl/w）有独立控制字符（Ctrl+h=0x08 等）不受影响
# 解法：显式发 CSI u 格式（tmux extended-keys always 可识别）
#   \x1b[45;7u  →  Unicode 45=`-`，modifier 7=Ctrl+Alt(1+2+4)
#   \x1b[92;7u  →  Unicode 92=`\`，modifier 7=Ctrl+Alt
map ctrl+alt+minus     send_text all \x1b[45;7u
map ctrl+alt+backslash send_text all \x1b[92;7u
map ctrl+alt+w         no_op
map ctrl+alt+h         no_op
map ctrl+alt+j         no_op
map ctrl+alt+k         no_op
map ctrl+alt+l         no_op
map ctrl+alt+left      no_op
map ctrl+alt+right     no_op
map ctrl+alt+up        no_op
map ctrl+alt+down      no_op

# --- 透传 tab 管理键给 tmux（显式 CSI u，对齐终端原生快捷键体验）---
# 为什么显式发 CSI u 而不是 no_op/不绑定：
#   1. no_op 会吞键不透传；不绑定则走 legacy 编码（ctrl+1 → '1'，ctrl+shift+t → 'T'），
#      tmux 无法与普通输入区分，bind-key -n C-1 / C-S-t 不会触发
#   2. 显式发 CSI u 绕开协议协商，tmux 的 extended-keys 直接识别 → 新建/关闭/切 window
# 格式：\x1b[<codepoint>;<modifier>u
#   modifier = 1 + Shift(1) + Alt(2) + Ctrl(4)
#   116='t' 119='w' 49..56='1'..'8'；Ctrl+Shift=6，Ctrl=5
map ctrl+shift+t send_text all \x1b[116;6u
map ctrl+shift+w send_text all \x1b[119;6u
map ctrl+1       send_text all \x1b[49;5u
map ctrl+2       send_text all \x1b[50;5u
map ctrl+3       send_text all \x1b[51;5u
map ctrl+4       send_text all \x1b[52;5u
map ctrl+5       send_text all \x1b[53;5u
map ctrl+6       send_text all \x1b[54;5u
map ctrl+7       send_text all \x1b[55;5u
map ctrl+8       send_text all \x1b[56;5u

# 其余 Kitty 默认 tab 切换键无对应 tmux 绑定，直接吞掉即可
map ctrl+tab         no_op
map ctrl+shift+tab   no_op
map ctrl+shift+right no_op
map ctrl+shift+left  no_op

# 本模式下 remote control 非必须（tmux 自己管 pane），但开着也无害；
# 如需关闭可删除下面两行，或靠主文件默认不开
# allow_remote_control no
