# ╭─────────────────────────────────────────────────────╮
# │       基础快捷键（真·通用，不随 tmux 模式变化）        │
# ╰─────────────────────────────────────────────────────╯
# Tab 管理 / 分屏已分别移至 standalone-keymap.conf 或 tmux-keymap.conf，
# 保证「二选一」互斥：终端自管 tab ↔ tmux 管 window

# 屏蔽 macOS 菜单默认的 Cmd+T / Cmd+W（防止抢键）
map cmd+t no_op
map cmd+w no_op

# 屏蔽 Secure Keyboard Entry 切换键（⌘⌥S 易误触）
# 开启后 kitty 调 EnableSecureEventInput()，macOS 会停止向所有 Carbon 全局热键
# 派发按键 → Maccy ⌥V 等全局热键只在 kitty 里失效。kitty 无 kitty.conf 直接关闭项，
# 故解绑切换键 + 写死 NSUserDefault（defaults write net.kovidgoyal.kitty SecureKeyboardEntry -bool false）
map opt+cmd+s no_op

# --- 字体缩放 ---
map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0     change_font_size all 0

# --- 新建 OS 窗口 ---
map ctrl+shift+n new_os_window

# --- 终端原生编不出来的键，CSI u 直注入（绕过 tmux 重编码）---
# 注入后归谁消费不一定：Ctrl+` 被 tmux 截住，Ctrl+Shift+l 才真的到 nvim
# Ctrl+` → tmux popup 浮层终端（conf/popup.conf）
map ctrl+grave send_text all \x1b[96;5u
# Ctrl+Shift+l → nvim vim-visual-multi 的 Select All
map ctrl+shift+l send_text all \x1b[108;6u

# --- Shift+Enter 换行（Claude Code 等 TUI）---
# 默认 Shift+Enter 走 legacy 编码，与普通 Enter(\r) 无法区分 → 被当成提交。
# 显式发 CSI u（13=Enter，modifier 2=Shift），tmux extended-keys 透传给应用 → 换行。
map shift+enter send_text all \x1b[13;2u

# --- 鼠标 ---
# 右键粘贴
mouse_map right press ungrabbed paste_from_clipboard

# Shift+左键 透传给 nvim（默认 shift+click 被 kitty 用于扩展选中）
mouse_map shift+left press   grabbed,ungrabbed no_op
mouse_map shift+left release grabbed,ungrabbed no_op
mouse_map shift+left click   grabbed,ungrabbed no_op
