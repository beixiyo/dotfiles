# ╭─────────────────────────────────────────────────────╮
# │              Kitty 配置文件（模块化入口）             │
# │   实际内容按功能拆分到 modules/*.conf                │
# ╰─────────────────────────────────────────────────────╯
# 每个 include 的文件独立加载，后加载的会覆盖前面同名项。


# ──── 外观（主题、光标、字体、透明度、tab）────
include modules/appearance.conf

# ──── 窗口（尺寸、分屏布局、shell、macOS）────
include modules/window.conf

# ──── 基础快捷键（Tab / 字体缩放 / CSI u 透传 / 鼠标）────
include modules/keys-common.conf


# ╭─────────────────────────────────────────────────────╮
# │       Window 管理模式（二选一，注释切换）             │
# ╰─────────────────────────────────────────────────────╯
# native：Kitty 原生 tab + pane（smart-splits 透传 IS_NVIM 给 Nvim）
# tmux  ：tab / pane 全交给 tmux，由 tmux 条件 bind 无缝切换
#
# 默认 tmux 模式；切回 Kitty 原生，注释下面一行、取消注释上面一行

# include modules/keys-native.conf
include modules/keys-tmux.conf


# 颜色主题：先加载提交的 Catppuccin 兜底,再用 matugen 输出覆盖(后加载覆盖同名项)
# matugen 缺失时(如新克隆未跑 matugen)globinclude 零匹配静默忽略,沿用兜底,无警告
include themes/fallback.conf
globinclude themes/matugen.conf

# 主题之后再加载用户覆盖（选中色/边框色），确保能压过主题同名项
include modules/overrides.conf

# 允许 matugen 用 `kitty @ set-colors` 实时改色(保留运行时字号,不触发整配置重载)
# socket-only：仅经下方 socket 控制(比 yes 更收敛);listen_on 按 pid 区分多实例
allow_remote_control socket-only
listen_on unix:/tmp/mykitty-{kitty_pid}